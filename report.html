<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้ารายงานคิว - บ้านยาสะพานขาว</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { itim: ['Itim', 'cursive'] },
                    colors: {
                        cafe: {
                            50: '#fbf8f3', 100: '#f5efe6', 200: '#eadbc3', 300: '#dfc29c',
                            400: '#d1a271', 500: '#c6864d', 600: '#b96e3f', 700: '#9a5635',
                            800: '#804832', 900: '#673b2a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Itim', cursive; }
    </style>
</head>
<body class="bg-cafe-50 min-h-screen p-6 text-cafe-900">

    <div class="max-w-7xl mx-auto bg-white p-8 rounded-3xl shadow-lg border border-cafe-100 relative">
        <a href="index.html" class="absolute top-6 left-6 text-cafe-500 hover:text-cafe-700 transition-colors flex items-center text-lg font-bold">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            กลับหน้าหลัก
        </a>

        <div class="flex flex-col md:flex-row justify-between items-center mt-12 mb-8">
            <h2 class="text-3xl md:text-4xl font-bold text-cafe-800 mb-4 md:mb-0">📋 ระบบจัดการคิวร้านยา</h2>
            <button id="loadBtn" class="bg-cafe-600 hover:bg-cafe-700 text-white px-6 py-3 rounded-xl shadow-md transition-all transform hover:-translate-y-1 text-lg flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                รีเฟรชข้อมูลคิว
            </button>
        </div>

        <!-- สถานะโหลดข้อมูล -->
        <div id="loadingStatus" class="text-center text-cafe-500 hidden py-12">
            <svg class="animate-spin h-10 w-10 mx-auto mb-4 text-cafe-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="text-2xl">กำลังโหลดข้อมูลคิว...</span>
        </div>

        <!-- ตารางแสดงผล -->
        <div class="overflow-x-auto rounded-xl border border-cafe-200 shadow-sm">
            <table class="min-w-full divide-y divide-cafe-200" id="queuesTable">
                <thead class="bg-cafe-100">
                    <tr>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">หมายเลขคิว</th>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">สถานะ</th>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">ชื่อ-นามสกุล (อายุ)</th>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">อาการเบื้องต้น</th>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">ความรุนแรง</th>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">แพ้ยา/โรคประจำตัว</th>
                        <th class="px-6 py-4 text-left text-lg font-bold text-cafe-800">เวลาจอง</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-cafe-100" id="tableBody">
                    <tr>
                        <td colspan="7" class="px-6 py-12 text-center text-cafe-400 text-xl">
                            กรุณากดปุ่ม "รีเฟรชข้อมูลคิว" เพื่อดึงข้อมูล
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- ข้อความแจ้ง Error -->
        <div id="errorBox" class="mt-6 hidden p-4 bg-red-50 text-red-700 rounded-xl text-lg border border-red-200"></div>
    </div>

    <script>
        // กำหนดค่า Supabase
        const SUPABASE_URL = 'https://odqyebcueuzwwibjkxvc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kcXllYmN1ZXV6d3dpYmpreHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDgwMDgsImV4cCI6MjA5NzU4NDAwOH0.h7wKTuKBsv6LDgo-RoUGeX2Cys-5e4JZ8x6hL-ObeVQ';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loadBtn = document.getElementById('loadBtn');
        const tableBody = document.getElementById('tableBody');
        const loadingStatus = document.getElementById('loadingStatus');
        const errorBox = document.getElementById('errorBox');
        const table = document.getElementById('queuesTable');

        async function fetchQueues() {
            errorBox.classList.add('hidden');
            tableBody.innerHTML = '';
            table.classList.add('hidden');
            loadingStatus.classList.remove('hidden');
            loadBtn.disabled = true;

            try {
                // ดึงข้อมูลจากตาราง queues
                const { data, error } = await supabase
                    .from('queues')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-cafe-500 text-xl">
                                ยังไม่มีข้อมูลการจองคิวในระบบ
                            </td>
                        </tr>
                    `;
                } else {
                    data.forEach(row => {
                        const dateObj = new Date(row.created_at);
                        const formattedTime = dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                        const formattedDate = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                        
                        // สีสถานะ
                        let statusColor = 'bg-gray-100 text-gray-800';
                        if (row.status === 'รอคิว') statusColor = 'bg-yellow-100 text-yellow-800 border-yellow-200';
                        else if (row.status === 'กำลังเรียก') statusColor = 'bg-blue-100 text-blue-800 border-blue-200';
                        else if (row.status === 'เสร็จสิ้น') statusColor = 'bg-green-100 text-green-800 border-green-200';
                        else if (row.status === 'ยกเลิก' || row.status === 'สละสิทธิ์') statusColor = 'bg-red-100 text-red-800 border-red-200';

                        // สีความรุนแรง
                        let sevColor = 'text-green-600';
                        if(row.severity_level === 'Medium') sevColor = 'text-yellow-600';
                        if(row.severity_level === 'High') sevColor = 'text-red-600 font-bold';

                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-cafe-50 transition-colors';
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="font-bold text-2xl text-cafe-800">${row.queue_number || '-'}</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-4 py-1.5 inline-flex text-lg font-semibold rounded-full border ${statusColor}">
                                    ${row.status || '-'}
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-xl font-bold text-cafe-900">${row.full_name || '-'}</div>
                                <div class="text-cafe-600">อายุ: ${row.age} ปี | โทร: ${row.phone_number}</div>
                            </td>
                            <td class="px-6 py-4 text-lg text-cafe-700 max-w-xs break-words">
                                ${row.initial_symptoms || '-'}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-lg ${sevColor}">
                                ${row.severity_level || '-'}
                            </td>
                            <td class="px-6 py-4 text-md text-cafe-700">
                                <div><span class="font-semibold">แพ้ยา:</span> ${row.allergies || '-'}</div>
                                <div><span class="font-semibold">โรคประจำตัว:</span> ${row.chronic_diseases || '-'}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-cafe-600">
                                <div class="text-lg font-bold">${formattedTime} น.</div>
                                <div class="text-sm">${formattedDate}</div>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                }
            } catch (err) {
                errorBox.classList.remove('hidden');
                errorBox.innerHTML = `<b>เกิดข้อผิดพลาดในการดึงข้อมูล:</b> ${err.message}`;
            } finally {
                loadingStatus.classList.add('hidden');
                table.classList.remove('hidden');
                loadBtn.disabled = false;
            }
        }

        loadBtn.addEventListener('click', fetchQueues);

        // ดึงข้อมูลอัตโนมัติเมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', fetchQueues);
    </script>
</body>
</html>
